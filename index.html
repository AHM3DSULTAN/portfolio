<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed's Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/NfyN3ppM/Screenshot-2025-10-12-213357.png">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: rgb(32,32,32) url('https://i.postimg.cc/v8NsB73m/artistic-blurry-colorful-wallpaper-background.jpg') no-repeat center / cover;
            color: white;
        }

        .header-banner {
            font-size: 34.5px;
            font-weight: bold;
            text-align: center;
            background-color: rgb(75, 28, 242);
            padding: 35px 0;
            width: 100%;
            box-sizing: border-box;
        }

        .h1 {
            margin-top: 100px;
            margin-bottom: 20px;
            font-size: 35px;
            font-weight: 700;
            text-align: center;
        }

        p {
            margin: 20px;
            font-size: 22.5px;
            font-weight: 400;
            text-align: center;
        }

        /* Center container */
        .button-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        /* Glass / glossy button */
        .button {
            font-size: 18px;
            font-weight: 500;
            color: white;
            padding: 14px 28px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);

            cursor: default;
            transition: 0.3s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>

<body>

    <div class="header-banner">Ahmed's Portfolio</div>

    <h1 class="h1">🧑‍💻 Maintenance Ongoing...</h1>

    <p>Ahmed is currently busy adding cool stuff to this site, please check back later!</p>

    <div class="button-wrapper">
        <button class="button">
            Estimated back in: <b>5 days</b>
        </button>
    </div>

</body>
</html>
